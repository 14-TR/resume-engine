site_name: Resume Engine
site_description: AI-powered resume tailoring CLI. One command, perfect resume.
site_url: https://14-tr.github.io/resume-engine
repo_url: https://github.com/14-TR/resume-engine
repo_name: 14-TR/resume-engine
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Tutorials:
      - Tailor Your First Resume: tutorials/tailor-first-resume.md
      - Import from LinkedIn: tutorials/import-from-linkedin.md
      - Batch Mode: tutorials/batch-mode.md
      - ATS Score Analysis: tutorials/ats-analysis.md
  - Reference:
      - Commands: reference/commands.md
      - LLM Backends: reference/llm-backends.md
      - Templates: reference/templates.md
      - PDF Output: reference/pdf-output.md
  - Guides:
      - Master Resume Format: guides/master-resume-format.md
      - Job Search Workflow: guides/job-search-workflow.md
  - Contributing: contributing.md
