name: CI

on:
  push:
    branches: ["main", "jig/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff pytest-cov

      - name: Lint with ruff
        run: |
          ruff check resume_engine/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=resume_engine --cov-report=term-missing

  lint-only:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: ruff format --check resume_engine/ tests/
